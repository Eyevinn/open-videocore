name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up runtime
        # TODO: replace with correct runtime setup after ADR-001 is approved
        run: echo "Runtime setup TBD — pending ADR-001"

      - name: Install dependencies
        run: echo "Install TBD — pending ADR-001"

      - name: Run tests
        run: echo "Tests TBD — pending ADR-001"

      - name: Check for commercial names
        run: |
          # Scan for known prohibited terms (internal list — update as needed)
          # This is intentionally minimal; expand after legal review
          if grep -rI --include="*.ts" --include="*.js" --include="*.py" --include="*.go" \
            -l "PLACEHOLDER_PROHIBITED_TERM" . 2>/dev/null | grep -q .; then
            echo "ERROR: Prohibited term found in source files"
            exit 1
          fi
          echo "Name check passed"
